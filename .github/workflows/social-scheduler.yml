name: Social Media Scheduler

on:
  schedule:
    # 每周一、三、五 18:00 UTC 检查发布队列 (= 次日 02:00 北京时间)
    - cron: '0 18 * * 1,3,5'
    # 每周二、四、六、日 12:00 UTC 检查发布队列 (= 当日 20:00 北京时间)
    - cron: '0 12 * * 2,4,6,0'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'process-queue'
        type: choice
        options:
          - process-queue
          - generate-all
          - list-queue
      platform:
        description: 'Platform filter (optional)'
        required: false
        type: choice
        options:
          - all
          - wechat
          - xiaohongshu
          - zhihu

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  social-scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-npm-cache

      - name: Install Dependencies
        run: npm install

      - name: List Queue
        if: github.event.inputs.action == 'list-queue' || github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'list-queue'
        run: node scripts/social-scheduler.js --list

      - name: Process Publish Queue
        if: github.event.inputs.action == 'process-queue' || github.event_name == 'schedule'
        run: |
          echo "==========================================="
          echo "社交媒体排程任务"
          echo "==========================================="
          echo "触发时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "==========================================="

          # 获取待发布项目
          node scripts/social-scheduler.js --pending

          # 注意: 实际发布需要各平台的 API credentials
          # 这里仅生成内容和更新队列状态
          # 真实发布需要配置各平台的 Webhook 或 API

          echo ""
          echo "==========================================="
          echo "排程检查完成"
          echo "==========================================="
          echo "提示: 若要实际发布到各平台，请配置以下环境变量:"
          echo "  - WECHAT_WEBHOOK_URL (微信公众号)"
          echo "  - XIAOHONGSHU_WEBHOOK_URL (小红书)"
          echo "  - ZHIHU_ACCESS_TOKEN (知乎)"
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          XIAOHONGSHU_WEBHOOK_URL: ${{ secrets.XIAOHONGSHU_WEBHOOK_URL }}
          ZHIHU_ACCESS_TOKEN: ${{ secrets.ZHIHU_ACCESS_TOKEN }}

      - name: Generate Content for All Platforms
        if: github.event.inputs.action == 'generate-all'
        run: |
          echo "生成所有平台适配内容..."
          for file in source/_posts/*.md; do
            if [ -f "$file" ]; then
              echo "处理: $file"
              node scripts/social-scheduler.js --generate "$file" wechat
              node scripts/social-scheduler.js --generate "$file" xiaohongshu
              node scripts/social-scheduler.js --generate "$file" zhihu
            fi
          done
        env:
          PLATFORM_FILTER: ${{ github.event.inputs.platform || 'all' }}

      - name: Commit Generated Content
        run: |
          if [ -n "$(git status --porcelain reports/social-content/)" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add reports/social-content/
            git commit -m "chore: 生成社交媒体适配内容 $(date +'%Y-%m-%d')"
            git push || echo "Push failed or no changes to push"
          else
            echo "没有新内容需要提交"
          fi

  notify:
    needs: social-scheduler
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Send Notification
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          npm run notify -- --message "社交媒体排程任务已完成" || echo "通知发送失败"
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}