# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Hello World  分享知识,持续学习
subtitle: '一名的程序猿,梦想技术让世界变得更美好!'
description: '这是一个技术博客，记录技术分享和学习，欢迎访问！'
keywords: 程序猿视界,编程,开发,软件工程,前端,全栈,技术博客,程序猿,技术分享交流
author: Shenhuanjie
language: zh
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://shenhuanjie.github.io/
# permalink: :year/:month/:day/:title/
permalink: :year/:month/:day/:hash/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 100
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  AI大模型: ai-llm
  AI应用: ai-application
  智能化标准: ai-standard
  AI周报: ai-weekly
  AI日更: ai-daily
  AI人工智能: ai
  产业观察: industry
  AI资讯: ai-news
tag_map:
  AI大模型: ai-llm
  大模型: ai-llm
  LLM: ai-llm
  GPT: ai-llm
  AI应用: ai-application
  AI工具: ai-application
  智能化标准: ai-standard
  L1-L4: ai-standard
  AI分级: ai-standard
  AI周报: ai-weekly
  AI日更: ai-daily
  人工智能: ai
  AI治理: ai-governance
  产业动态: industry
  技术变革: technology

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Site Location (for geo.position meta tag - OpenStreetMap)
# Format: latitude;longitude (e.g., "31.2304;121.4737" for Shanghai)
site_location:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 100
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: Chic

# Search discovery
sitemap:
  path: sitemap.xml
  rel: true
  tags: true
  categories: true
  # 多语言 Sitemap 配置
  i18n:
    enable: true
    default_language: zh
    languages: ['zh', 'en']

# Social Sharing Default Image (used when no cover image is specified)
og_image: https://shenhuanjie.github.io/images/og-default.png

search:
  path: search.json
  field: post
  content: true

feed:
  type:
    - atom
    - json
  atom:
    path: atom.xml
    limit: 20
    hub: https://pubsubhubbub.appspot.com
  json:
    path: feed.json
    limit: 20
    meta:
      - title
      - description
      - author
      - email
    pretty: true
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''

# AI Helper 配置
ai_auto_generate: true

# ==============================
# 数据分析配置 (v2.2 Phase 3)
# ==============================
# Google Analytics 4 配置
# 说明：详细配置说明请参考 docs/product/数据分析配置指南.md
#
# 【重要】主题配置说明：
# Chic 主题的 GA4 配置位于 themes/Chic/_config.yml
# 该配置文件供 Hexo 插件或自定义集成使用
#
# 【如何获取 Measurement ID】
# 1. 访问 https://analytics.google.com/ 并登录
# 2. 进入「管理」→「数据流」→ 选择您的网站数据流
# 3. 点击「测量 ID」查看，格式为 G-XXXXXXXXXX
google_analytics:
  enable: true
  # 请替换为您的 GA4 Measurement ID (格式: G-XXXXXXXXXX)
  measurement_id: 'G-XXXXXXXXXX'
  # 高级选项
  options:
    anonymize_ip: true          # 匿名化 IP（GDPR 合规）
    send_page_view: true        # 自动发送页面浏览事件
    debug_mode: false            # 调试模式（仅开发时启用）

# 百度统计配置（可选，作为 GA4 的补充，国内访问数据更准确）
# 说明：与 GA4 可同时使用，详细配置请参考 docs/product/数据分析配置指南.md
baidu_tongji:
  enable: false
  # 请替换为您的百度统计代码
  code: ''

# ==============================
# 国际化配置 (v1.9)
# ==============================
i18n:
  enable: true
  default_language: zh
  languages:
    - zh
    - en
  # 英文分类映射
  category_map:
    AI大模型: ai-llm
    AI应用: ai-application
    智能化标准: ai-standard
    AI周报: ai-weekly
    AI日更: ai-daily
    AI人工智能: ai
    产业观察: industry
    AI资讯: ai-news
  # 英文标签映射
  tag_map:
    AI大模型: ai-llm
    大模型: ai-llm
    LLM: ai-llm
    GPT: ai-llm
    AI应用: ai-application
    AI工具: ai-application
    智能化标准: ai-standard
    L1-L4: ai-standard
    AI分级: ai-standard
    AI周报: ai-weekly
    AI日更: ai-daily
    人工智能: ai
    AI治理: ai-governance
    产业动态: industry
    技术变革: technology

# HTML 压缩配置
html_minifier:
  enable: true
  exclude:
    - '*.min.css'
    - '*.min.js'
  ignore_error: false
  tiny_comments: true
  remove_comments: true
  remove_input_type: true
  remove_attribute_quotas: false
