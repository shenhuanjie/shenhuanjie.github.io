# Post page
## Post_meta
post_meta_enable: true

post_author_enable: true
post_date_enable: true
post_category_enable: true
## Post copyright
post_copyright_enable: true

post_copyright_author_enable: true
post_copyright_permalink_enable: true
post_copyright_license_enable: true
post_copyright_license_text: Copyright (c) 2024 <a href="http://creativecommons.org/licenses/by-nc/4.0/">CC-BY-NC-4.0</a> LICENSE
post_copyright_slogan_enable: true
post_copyright_slogan_text: Do you believe in <strong>DESTINY</strong>?
## toc
post_toc_enable: true

# Page
page_title_enable: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: MMMM D, YYYY
time_format: H:mm:ss

# stylesheets loaded in the <head>
stylesheets:
  - /css/style.css

# scripts loaded in the end of the body
scripts:
  - /js/script.js
  - /js/tocbot.min.js
  - /js/user-interaction.js
  - /js/favorites-page.js
    # tscanlin/tocbot: Build a table of contents from headings in an HTML document.
    # https://github.com/tscanlin/tocbot


# plugin functions
## Mathjax: Math Formula Support
## https://www.mathjax.org
mathjax:
  enable: true
  import: demand # global or demand
  ## global: all pages will load mathjax,this will degrade performance and some grammers may be parsed wrong.
  ## demand: Recommend option,if your post need fomula, you can declare 'mathjax: true' in Front-matter

# Utterances 评论系统
## https://utteranc.es/
## 需要在 GitHub 仓库中安装 utterances APP
utterances:
  enable: true
  repo: shenhuanjie/shenhuanjie.github.io  # 格式: username/repo
  issue_term: pathname  # pathname, url, title, og:title
  label: comment  # 评论标签（可选）
  theme: github-light
  dark_theme: github-dark

# Google Analytics 4
## https://analytics.google.com/
google_analytics:
  enable: true
  tracking_id: G-XXXXXXXXXX  # 需用户配置 - 替换为你的 GA4 测量 ID

# ==============================
# CDN 静态资源加速配置 (v1.5)
# ==============================
## 使用 jsDelivr CDN 加速静态资源
## https://www.jsdelivr.com/
cdn:
  enable: true
  # jsDelivr CDN 基础 URL
  base: https://cdn.jsdelivr.net/npm
  # 主题资源路径映射 (格式: 本地路径: CDN路径)
  # 本地资源: /themes/Chic/source/xxx
  # CDN 资源: 格式为 gh/username/repo@version/path 或 npm/package@version/path
  mapping:
    # 图标字体使用 jsdelivr
    /fonts: https://cdn.jsdelivr.net/gh/shenhuanjie/shenhuanjie.github.io@master/themes/Chic/source/fonts
    # CSS 使用 jsdelivr (如果需要额外 CSS)
    # /css: https://cdn.jsdelivr.net/gh/shenhuanjie/shenhuanjie.github.io@master/themes/Chic/source/css
  # CSS 文件
  css:
    - /css/style.css
  # JavaScript 文件
  js:
    - /js/script.js
    - /js/tocbot.min.js
    - /js/user-interaction.js
    - /js/favorites-page.js
    # MathJax CDN
    - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML
